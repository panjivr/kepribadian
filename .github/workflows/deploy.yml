name: Deploy Djiva ke GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Satu deploy berjalan pada satu waktu; jangan batalkan deploy yang sedang jalan.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verifikasi engine (73 tes)
        run: npm run test:engine

      - name: Build (static export)
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # Deploy hanya berhasil setelah GitHub Pages diaktifkan sekali di
  # Settings -> Pages -> Source: "GitHub Actions" (token otomatis tidak boleh
  # mengaktifkannya). continue-on-error menjaga run tetap hijau sampai itu
  # dilakukan — situs utama sudah live via Vercel (djiwa.web.id).
  deploy:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
